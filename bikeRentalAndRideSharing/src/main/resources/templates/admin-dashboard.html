<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Dashboard</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container">
    <h1>Admin Dashboard</h1>
    <div class="dashboard-stats">
        <div class="stat-card">
            <h3>Total Users</h3>
            <p th:text="${userCount}">0</p>
            <a th:href="@{/admin/users}">Manage Users</a>
        </div>
        <div class="stat-card">
            <h3>Total Bikes</h3>
            <p th:text="${bikeCount}">0</p>
            <a th:href="@{/admin/bikes}">Manage Bikes</a>
        </div>
        <div class="stat-card">
            <h3>Active Rides</h3>
            <p th:text="${rideCount}">0</p>
            <a th:href="@{/admin/rides}">View Rides</a>
        </div>
    </div>
    <a th:href="@{/logout}">Logout</a>
</div>
</body>
</html>
