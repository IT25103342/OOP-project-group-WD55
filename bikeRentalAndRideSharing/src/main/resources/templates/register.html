<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register - Bike Share</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="auth-page">
<div class="auth-container">
    <h2>Create Account</h2>
    <form th:action="@{/register}" th:object="${userLogin}" method="post" class="auth-form">

        <div class="form-group">
            <label>Username</label>
            <input type="text" th:field="*{username}" placeholder="Choose a username" required />
        </div>

        <div class="form-group">
            <label>Email Address</label>
            <input type="email" th:field="*{email}" placeholder="email@example.com" required />
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" th:field="*{password}" placeholder="Create a password" required />
        </div>

        <div class="form-group">
            <label>Role</label>
            <select th:field="*{role}" required>
                <option value="USER">Standard User</option>
                <option value="ADMIN">Administrator</option>
            </select>
        </div>

        <button type="submit" class="btn-primary" style="width: 100%;">Register</button>
    </form>

    <div class="auth-footer">
        <p>Already have an account? <a th:href="@{/login}">Login here</a></p>
    </div>
</div>
</body>
</html>
