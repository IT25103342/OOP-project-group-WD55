<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login - Bike Share</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="auth-page">
<div class="auth-container">
    <h2>Login</h2>
    <form th:action="@{/login}" th:object="${userLogin}" method="post" class="auth-form">
        <div class="form-group">
            <label>Username</label>
            <input type="text" th:field="*{username}" required />
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" th:field="*{password}" required />
        </div>
        <button type="submit" class="btn-primary">Sign In</button>
    </form>
    <p>Don't have an account? <a th:href="@{/register}">Register here</a></p>

    <div th:if="${param.error}" class="alert-error">Invalid username or password.</div>
    <div th:if="${param.registered}" class="alert-success">Registration successful! Please login.</div>
</div>
</body>
</html>
