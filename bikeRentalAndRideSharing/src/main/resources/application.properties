# This looks for the Railway Variable, or defaults to your laptop settings
spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/bikeRentalAndRideSharing}
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:password}

# Crucial for Railway to open the web door
server.port=${PORT:8080}

# Automatically creates tables in the cloud database
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true